version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: wick_postgres
    restart: always
    environment:
      POSTGRES_DB: wickdb
      POSTGRES_USER: wickuser
      POSTGRES_PASSWORD: wickpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: wick_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data: