spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/wickdb
    username: ${DB_USERNAME:wickuser}
    password: ${DB_PASSWORD:wickpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # Dev ortam için: entity’den tablo oluşturur
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:cok-uzun-ve-guclu-bir-secret-key-an-az-32-karakter-olmali}
  expiration: 86400000

server:
  port: 8080