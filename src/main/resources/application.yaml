spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/wickdb
    username: ${DB_USERNAME:wickuser}
    password: ${DB_PASSWORD:wickpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

jwt:
  secret: ${JWT_SECRET:cok-uzun-ve-guclu-bir-secret-key-an-az-32-karakter-olmali}
  expiration: 3600000
  refresh-expiration: 604800000

server:
  port: 8080
  base-url: http://localhost:8080

file:
  upload:
    base-dir: uploads