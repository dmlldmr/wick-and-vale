<main class="admin-page">
  <div class="admin-header">
    <h1 class="admin-title">Koleksiyonlar</h1>
    <a class="btn-primary" routerLink="/admin/collections/new">+ Yeni Koleksiyon</a>
  </div>

  <div *ngIf="loading" class="state-message">Yükleniyor...</div>
  <div *ngIf="error" class="state-message state-error">{{ error }}</div>

  <table *ngIf="!loading && !error" class="products-table">
    <thead>
    <tr>
      <th>Görsel</th>           <!-- 🔥 1. sıraya Görsel -->
      <th>Tür</th>              <!-- 2. sıra -->
      <th>Açıklama</th>         <!-- 3. sıra -->
      <th></th>                 <!-- 4. sıra (işlemler) -->
    </tr>
    </thead>
    <tbody>
    <tr *ngIf="collections.length === 0">
      <td colspan="4" class="empty-row">Henüz koleksiyon yok.</td>
    </tr>
    <tr *ngFor="let col of collections">
      <!-- 🔥 1. HÜCRE: Görsel (class eklendi) -->
      <td class="product-image-cell">
        <img
          *ngIf="col.coverImage"
          [src]="col.coverImage"
          alt="kapak"
          class="product-thumbnail"
        />
        <div *ngIf="!col.coverImage" class="no-image">
          📷
        </div>
      </td>

      <!-- 2. HÜCRE: Tür -->
      <td>{{ getTypeLabel(col.collectionType) }}</td>

      <!-- 3. HÜCRE: Açıklama -->
      <td>{{ col.description || '—' }}</td>

      <!-- 4. HÜCRE: İşlemler -->
      <td class="actions">
        <button class="btn-edit" (click)="edit(col.id)">Düzenle</button>
        <button class="btn-delete" (click)="delete(col.id)">Sil</button>
      </td>
    </tr>
    </tbody>
  </table>
</main>
