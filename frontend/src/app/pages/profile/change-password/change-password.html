<main class="change-password-page">
  <div class="change-password-container">
    <div class="page-header">
      <a routerLink="/profile" class="back-link">← Profil</a>
      <h1 class="page-title">Şifre Değiştir</h1>
    </div>

    <div class="form-card">
      <div *ngIf="error()" class="alert-error">{{ error() }}</div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label for="currentPassword">Mevcut Şifre</label>
          <input
            type="password"
            id="currentPassword"
            formControlName="currentPassword"
            placeholder="Mevcut şifreniz"
          />
        </div>

        <div class="form-group">
          <label for="newPassword">Yeni Şifre</label>
          <input
            type="password"
            id="newPassword"
            formControlName="newPassword"
            placeholder="En az 8 karakter"
          />
          <span *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('minlength')" class="field-error">
              En az 8 karakter olmalı.
            </span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Yeni Şifre Tekrar</label>
          <input
            type="password"
            id="confirmPassword"
            formControlName="confirmPassword"
            placeholder="Yeni şifrenizi tekrar girin"
          />
          <span *ngIf="passwordMismatch" class="field-error">Şifreler eşleşmiyor.</span>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" routerLink="/profile">İptal</button>
          <button type="submit" class="btn-save" [disabled]="form.invalid || passwordMismatch || submitting()">
            {{ submitting() ? 'Değiştiriliyor...' : 'Şifreyi Değiştir' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
