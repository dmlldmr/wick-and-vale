<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="brand-name">Wick &amp; Vale</span>
      <h1 class="auth-title">Giriş Yap</h1>
    </div>
    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label for="email">E-posta</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="ornek@email.com" required />
      </div>
      <div class="form-field">
        <label for="password">Şifre</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      <p class="auth-error" *ngIf="error">{{ error }}</p>
      <button class="btn-primary" type="submit">Giriş Yap</button>
    </form>
    <p class="auth-link">Hesabın yok mu? <a routerLink="/register">Kayıt ol</a></p>
  </div>
</div>
