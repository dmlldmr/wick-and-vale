<div class="home-container">
  <div class="hero-section">
    <h1>Wick N' Vale</h1>
    <p>El yapımı mumlar ile evinize sıcaklık katın</p>
  </div>

  <div class="products-section">
    <h2>Öne Çıkan Ürünler</h2>

    <div *ngIf="loading" class="loading">Yükleniyor...</div>

    <div *ngIf="!loading" class="products-grid">
      <div *ngFor="let product of products" class="product-card">
        <div class="product-image-container">
          <!-- 🔥 image -> imageUrl -->
          <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.name" class="product-image">
          <div *ngIf="!product.imageUrl" class="product-image-placeholder">
            🕯️
          </div>
        </div>
        <div class="product-info">
          <h3 class="product-name">{{ product.name }}</h3>
          <p class="product-type">{{ product.collectionType }} - {{ product.variantType }}</p>
          <p class="product-price">{{ product.price }} ₺</p>
          <button class="btn-view" [routerLink]="['/products', product.id]">İncele</button>
        </div>
      </div>
    </div>
  </div>
</div>
